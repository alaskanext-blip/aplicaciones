<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Súper Lista del Refri</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Iconos -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Animaciones suaves */
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        /* Ocultar scrollbar pero permitir scroll */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-100 text-slate-800 font-sans antialiased min-h-screen flex flex-col">

    <!-- Contenedor Principal -->
    <main class="flex-1 w-full max-w-md mx-auto bg-white min-h-screen shadow-2xl relative pb-24">
        
        <!-- Encabezado -->
        <header class="bg-green-600 text-white p-6 rounded-b-[2rem] shadow-md sticky top-0 z-10">
            <div class="flex items-center justify-between">
                <div>
                    <h1 class="text-2xl font-black tracking-tight">Mi Refri</h1>
                    <p class="text-green-200 text-xs font-medium uppercase tracking-widest mt-1 flex items-center gap-1">
                        <span class="w-2 h-2 rounded-full bg-green-300 animate-pulse"></span> Lista Compartida
                    </p>
                </div>
                <button onclick="toggleQR(true)" class="bg-white/20 hover:bg-white/30 p-3 rounded-2xl backdrop-blur-sm transition-all active:scale-95">
                    <i data-lucide="qr-code" class="w-6 h-6"></i>
                </button>
            </div>

            <!-- Formulario Integrado en el Header -->
            <form id="add-form" class="mt-6 flex gap-2 relative">
                <input type="text" id="item-input" required autocomplete="off"
                    placeholder="Ej. Leche, Huevos, Pan..." 
                    class="flex-1 px-5 py-4 rounded-2xl text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-4 focus:ring-green-300/50 shadow-inner transition-all">
                <button type="submit" id="btn-add" class="bg-slate-900 text-white p-4 rounded-2xl hover:bg-black active:scale-95 transition-all shadow-lg flex items-center justify-center min-w-[60px]">
                    <i data-lucide="plus" class="w-6 h-6"></i>
                </button>
            </form>
        </header>

        <!-- Lista de Productos -->
        <div class="p-6">
            <div id="items-list" class="space-y-3">
                <!-- Estado de Carga Inicial -->
                <div class="flex flex-col items-center justify-center py-12 text-slate-400">
                    <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-green-600 mb-4"></div>
                    <p class="font-medium">Conectando a la despensa...</p>
                </div>
            </div>
        </div>

        <!-- Barra de Acciones Inferior (Fija) -->
        <div id="action-bar" class="fixed bottom-0 left-0 right-0 w-full max-w-md mx-auto bg-white/80 backdrop-blur-md border-t border-slate-100 p-4 pb-safe hidden">
            <div class="flex gap-3">
                <button onclick="clearAllItems()" class="flex-1 bg-red-50 text-red-600 hover:bg-red-100 py-4 rounded-2xl font-bold flex items-center justify-center gap-2 transition-all active:scale-95">
                    <i data-lucide="trash-2" class="w-5 h-5"></i> Vaciar
                </button>
                <button onclick="sendListByEmail()" id="btn-send" class="flex-[2] bg-green-600 text-white hover:bg-green-700 py-4 rounded-2xl font-bold flex items-center justify-center gap-2 shadow-lg shadow-green-200 transition-all active:scale-95">
                    <i data-lucide="send" class="w-5 h-5"></i> Enviar a Widdex
                </button>
            </div>
        </div>

    </main>

    <!-- Modal QR -->
    <div id="qr-modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-6 z-50 fade-in">
        <div class="bg-white p-8 rounded-[2.5rem] w-full max-w-sm text-center relative shadow-2xl">
            <button onclick="toggleQR(false)" class="absolute top-5 right-5 text-slate-400 hover:text-slate-700 bg-slate-100 rounded-full p-2 transition-all">
                <i data-lucide="x" class="w-5 h-5"></i>
            </button>
            <div class="bg-green-50 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4">
                <i data-lucide="smartphone-nfc" class="w-8 h-8 text-green-600"></i>
            </div>
            <h2 class="text-2xl font-black mb-2 text-slate-800">Escanea y Añade</h2>
            <p class="text-slate-500 text-sm mb-6">Pega esto en el refri. Todos podrán agregar productos desde su celular.</p>
            <div class="bg-white p-4 rounded-3xl border-2 border-slate-100 shadow-inner mb-6">
                <img id="qr-image" src="" alt="Código QR" class="w-full aspect-square mix-blend-multiply">
            </div>
        </div>
    </div>

    <!-- Notificaciones flotantes (Toast) -->
    <div id="toast" class="fixed top-6 left-1/2 transform -translate-x-1/2 bg-slate-800 text-white px-6 py-3 rounded-full shadow-2xl transition-all duration-300 opacity-0 -translate-y-4 pointer-events-none z-[60] flex items-center gap-2 font-medium text-sm">
        <i data-lucide="check-circle-2" class="w-5 h-5 text-green-400"></i>
        <span id="toast-msg">Mensaje</span>
    </div>

    <!-- ========================================== -->
    <!-- LÓGICA DE LA APLICACIÓN (FIREBASE + JS)    -->
    <!-- ========================================== -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, getDocs, writeBatch } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        // 1. CONFIGURACIÓN
        // Si vas a subir esto a GitHub, pon tus llaves donde dice "TU_API_KEY", etc.
        const isPreview = typeof __firebase_config !== 'undefined';
        const firebaseConfig = isPreview ? JSON.parse(__firebase_config) : {
            apiKey: "TU_API_KEY",
            authDomain: "TU_PROYECTO.firebaseapp.com",
            projectId: "TU_PROYECTO",
            storageBucket: "TU_PROYECTO.appspot.com",
            messagingSenderId: "TU_ID",
            appId: "TU_APP_ID"
        };
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'lista-widdex-definitiva';

        // 2. INICIALIZACIÓN
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const listRef = collection(db, 'artifacts', appId, 'public', 'data', 'shopping_list');
        
        let shoppingItems = [];
        let unsubscribeList = null;
        lucide.createIcons();

        // 3. AUTENTICACIÓN SILENCIOSA (Requerido para bases de datos compartidas)
        async function init() {
            try {
                if (!isPreview && firebaseConfig.apiKey === "TU_API_KEY") throw new Error("no-config");
                
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (error) {
                mostrarErrorConfiguracion();
            }
        }

        onAuthStateChanged(auth, (user) => {
            if (user) escucharBaseDeDatos();
        });

        // 4. ESCUCHAR CAMBIOS EN TIEMPO REAL
        function escucharBaseDeDatos() {
            if (unsubscribeList) unsubscribeList();

            unsubscribeList = onSnapshot(listRef, (snapshot) => {
                // Mapear y ordenar los datos desde lo más nuevo a lo más viejo
                shoppingItems = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                shoppingItems.sort((a, b) => b.createdAt - a.createdAt);
                dibujarLista();
            }, (error) => {
                console.error("Error leyendo datos:", error);
                mostrarErrorConfiguracion();
            });
        }

        // 5. INTERFAZ GRÁFICA
        function dibujarLista() {
            const listEl = document.getElementById('items-list');
            const actionBar = document.getElementById('action-bar');
            
            if (shoppingItems.length === 0) {
                listEl.innerHTML = `
                    <div class="flex flex-col items-center justify-center py-16 text-slate-400 fade-in">
                        <div class="bg-slate-100 p-6 rounded-full mb-4">
                            <i data-lucide="shopping-bag" class="w-12 h-12 text-slate-300"></i>
                        </div>
                        <p class="font-bold text-lg text-slate-600">¡Todo listo!</p>
                        <p class="text-sm">El refrigerador está abastecido.</p>
                    </div>`;
                actionBar.classList.add('hidden');
            } else {
                listEl.innerHTML = shoppingItems.map(item => `
                    <div class="fade-in bg-white border border-slate-100 p-4 rounded-2xl shadow-sm flex items-center justify-between group hover:border-green-200 transition-colors">
                        <div class="flex items-center gap-3 overflow-hidden">
                            <div class="w-2 h-2 rounded-full bg-green-500 flex-shrink-0"></div>
                            <span class="font-medium text-slate-700 truncate">${item.name}</span>
                        </div>
                        <button onclick="window.eliminarItem('${item.id}')" class="text-slate-300 hover:text-red-500 bg-slate-50 hover:bg-red-50 p-2 rounded-xl transition-all">
                            <i data-lucide="x" class="w-4 h-4"></i>
                        </button>
                    </div>
                `).join('');
                actionBar.classList.remove('hidden');
            }
            lucide.createIcons();
        }

        function mostrarErrorConfiguracion() {
            document.getElementById('items-list').innerHTML = `
                <div class="bg-red-50 border border-red-200 text-red-600 p-6 rounded-2xl text-center text-sm">
                    <i data-lucide="alert-triangle" class="w-8 h-8 mx-auto mb-2 text-red-500"></i>
                    <b>Falta conexión.</b><br>Si estás en GitHub, edita el código y agrega tus llaves de Firebase.
                </div>`;
            lucide.createIcons();
        }

        // 6. ACCIONES DEL USUARIO
        document.getElementById('add-form').onsubmit = async (e) => {
            e.preventDefault();
            if (!auth.currentUser) return;
            
            const input = document.getElementById('item-input');
            const name = input.value.trim();
            if (!name) return;

            // Bloquear input mientras sube
            input.disabled = true;
            try {
                await addDoc(listRef, { name, createdAt: Date.now() });
                input.value = '';
            } catch (err) { 
                showToast("Error al añadir producto"); 
            } finally {
                input.disabled = false;
                input.focus();
            }
        };

        window.eliminarItem = async (id) => {
            if (!auth.currentUser) return;
            try {
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'shopping_list', id));
            } catch (err) { console.error(err); }
        };

        window.clearAllItems = async () => {
            if (!auth.currentUser || !confirm("¿Vaciar toda la lista permanentemente?")) return;
            try {
                const snapshot = await getDocs(listRef);
                const batch = writeBatch(db);
                snapshot.docs.forEach(d => batch.delete(d.ref));
                await batch.commit();
                showToast("Lista vaciada con éxito");
            } catch (err) { console.error(err); }
        };

        // 7. ENVÍO DE CORREO INVISIBLE (FormSubmit)
        window.sendListByEmail = async () => {
            if (shoppingItems.length === 0) return;

            const btn = document.getElementById('btn-send');
            const originalHTML = btn.innerHTML;
            btn.innerHTML = `<div class="animate-spin h-5 w-5 border-2 border-white border-t-transparent rounded-full"></div> Enviando...`;
            btn.disabled = true;

            const listadoFormateado = shoppingItems.map((it, i) => `${i + 1}. ${it.name}`).join('\n');

            try {
                const response = await fetch("https://formsubmit.co/ajax/contacto@widdex.com", {
                    method: "POST",
                    headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                    body: JSON.stringify({
                        _subject: "🛒 Nueva Lista del Supermercado",
                        Lista_de_Compras: listadoFormateado,
                        _template: "table"
                    })
                });

                if (response.ok) {
                    showToast("¡Enviado a contacto@widdex.com!");
                } else {
                    throw new Error("Fallo FormSubmit");
                }
            } catch (error) {
                showToast("Revisa tu conexión a internet.");
            } finally {
                btn.innerHTML = originalHTML;
                btn.disabled = false;
                lucide.createIcons();
            }
        };

        // 8. UTILIDADES (QR y Notificaciones)
        window.showToast = (msg) => {
            const toast = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = msg;
            toast.classList.remove('opacity-0', '-translate-y-4');
            toast.classList.add('translate-y-0');
            setTimeout(() => {
                toast.classList.add('opacity-0', '-translate-y-4');
                toast.classList.remove('translate-y-0');
            }, 3000);
        };

        window.toggleQR = (show) => {
            const modal = document.getElementById('qr-modal');
            if (show) {
                const url = window.location.href.split('?')[0]; // URL limpia sin parámetros
                document.getElementById('qr-image').src = `https://api.qrserver.com/v1/create-qr-code/?size=400x400&data=${encodeURIComponent(url)}&color=0f172a&bgcolor=ffffff`;
                modal.classList.remove('hidden');
            } else {
                modal.classList.add('hidden');
            }
        };

        // Iniciar
        init();
    </script>
</body>
</html>

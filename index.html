<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lista del Refri</title>
    <!-- Tailwind CSS para diseño -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Iconos -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased min-h-screen flex flex-col">

    <main class="flex-1 w-full max-w-md mx-auto bg-white min-h-screen shadow-xl relative pb-24 border-x border-slate-100">
        
        <!-- Encabezado -->
        <header class="bg-slate-900 text-white p-6 rounded-b-[2rem] shadow-lg sticky top-0 z-10">
            <div class="flex items-center justify-between">
                <div>
                    <h1 class="text-2xl font-black tracking-tight">Despensa</h1>
                    <p class="text-xs font-bold uppercase tracking-widest mt-1 flex items-center gap-1">
                        <span id="sync-dot" class="w-2 h-2 rounded-full bg-slate-400"></span> 
                        <span id="sync-text" class="text-slate-400">Conectando...</span>
                    </p>
                </div>
                <button onclick="toggleQR(true)" class="bg-white/10 hover:bg-white/20 p-3 rounded-2xl transition-all active:scale-95">
                    <i data-lucide="qr-code" class="w-6 h-6"></i>
                </button>
            </div>

            <!-- Formulario de Ingreso -->
            <form id="add-form" class="mt-6 flex gap-2 relative">
                <input type="text" id="item-input" required autocomplete="off"
                    placeholder="¿Qué falta comprar?" 
                    class="flex-1 px-5 py-4 rounded-2xl text-slate-900 placeholder-slate-400 focus:outline-none focus:ring-4 focus:ring-blue-500/50 shadow-inner transition-all">
                <button type="submit" id="btn-add" class="bg-blue-600 text-white p-4 rounded-2xl hover:bg-blue-500 active:scale-95 transition-all shadow-lg flex items-center justify-center min-w-[60px]">
                    <i data-lucide="plus" class="w-6 h-6"></i>
                </button>
            </form>
        </header>

        <!-- Lista de Productos -->
        <div class="p-6">
            <div id="items-list" class="space-y-3">
                <div class="flex flex-col items-center justify-center py-16 text-slate-400">
                    <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600 mb-4"></div>
                    <p class="font-medium text-sm">Sincronizando con la nube...</p>
                </div>
            </div>
        </div>

        <!-- Barra de Acciones Inferior -->
        <div id="action-bar" class="fixed bottom-0 left-0 right-0 w-full max-w-md mx-auto bg-white/90 backdrop-blur-md border-t border-slate-100 p-4 pb-safe hidden">
            <div class="flex gap-3">
                <button onclick="clearAllItems()" class="flex-1 bg-slate-100 text-red-500 hover:bg-red-50 py-4 rounded-2xl font-bold flex items-center justify-center gap-2 transition-all active:scale-95">
                    <i data-lucide="trash-2" class="w-5 h-5"></i> Vaciar
                </button>
                <button onclick="sendListByEmail()" id="btn-send" class="flex-[2] bg-slate-900 text-white hover:bg-black py-4 rounded-2xl font-bold flex items-center justify-center gap-2 shadow-lg transition-all active:scale-95">
                    <i data-lucide="send" class="w-5 h-5"></i> Enviar a Widdex
                </button>
            </div>
        </div>
    </main>

    <!-- Modal QR -->
    <div id="qr-modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-6 z-50 fade-in">
        <div class="bg-white p-8 rounded-[2.5rem] w-full max-w-sm text-center relative shadow-2xl">
            <button onclick="toggleQR(false)" class="absolute top-5 right-5 text-slate-400 hover:text-slate-700 bg-slate-100 rounded-full p-2 transition-all">
                <i data-lucide="x" class="w-5 h-5"></i>
            </button>
            <div class="bg-blue-50 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4">
                <i data-lucide="users" class="w-8 h-8 text-blue-600"></i>
            </div>
            <h2 class="text-2xl font-black mb-2 text-slate-800">Invitar a la Lista</h2>
            <p class="text-slate-500 text-sm mb-4">Escanea el código o copia el ID para unirte desde otro celular.</p>
            
            <div class="bg-slate-100 p-3 rounded-xl mb-4 font-mono text-sm text-slate-700 select-all border border-slate-200">
                ID: <span id="room-id-display" class="font-bold text-blue-600"></span>
            </div>

            <div class="bg-white p-4 rounded-3xl border-2 border-slate-100 shadow-inner mb-2">
                <img id="qr-image" src="" alt="Código QR" class="w-full aspect-square">
            </div>
        </div>
    </div>

    <!-- Notificaciones flotantes (Toast) -->
    <div id="toast" class="fixed top-6 left-1/2 transform -translate-x-1/2 bg-slate-800 text-white px-6 py-3 rounded-full shadow-2xl transition-all duration-300 opacity-0 -translate-y-4 pointer-events-none z-[60] flex items-center gap-2 font-medium text-sm">
        <i data-lucide="check-circle-2" class="w-5 h-5 text-blue-400" id="toast-icon"></i>
        <span id="toast-msg">Mensaje</span>
    </div>

    <script>
        lucide.createIcons();

        // ==========================================
        // 1. CONFIGURACIÓN DE LA "SALA" (ROOM)
        // ==========================================
        let shoppingItems = [];
        let isSyncing = false;
        let listId = new URLSearchParams(window.location.search).get('id');

        if (!listId) {
            listId = localStorage.getItem('current_room_id');
            if (!listId) {
                listId = 'refri-widdex-' + Math.random().toString(36).substr(2, 9);
                localStorage.setItem('current_room_id', listId);
            }
            try {
                if (!window.location.href.startsWith('blob:') && !window.location.href.includes('usercontent')) {
                    const newUrl = window.location.protocol + "//" + window.location.host + window.location.pathname + '?id=' + listId;
                    window.history.replaceState({path: newUrl}, '', newUrl);
                }
            } catch (error) {
                console.warn("Entorno restringido detectado.");
            }
        } else {
            localStorage.setItem('current_room_id', listId);
        }

        const DWEET_URL = `https://dweet.io/dweet/for/${listId}`;
        const GET_URL = `https://dweet.io/get/latest/dweet/for/${listId}`;

        // ==========================================
        // 2. LÓGICA DE SINCRONIZACIÓN ROBUSTA
        // ==========================================
        
        function updateStatus(isOnline) {
            const dot = document.getElementById('sync-dot');
            const text = document.getElementById('sync-text');
            if (isOnline) {
                dot.className = "w-2 h-2 rounded-full bg-green-400 animate-pulse";
                text.className = "text-green-400";
                text.innerText = "Sincronizada";
            } else {
                dot.className = "w-2 h-2 rounded-full bg-red-400";
                text.className = "text-red-400";
                text.innerText = "Modo Local (Sin Nube)";
            }
        }

        async function syncWithCloud() {
            if (isSyncing) return;
            isSyncing = true;

            try {
                // Rompedor de Caché vital para móviles
                const cacheBuster = "?_=" + Date.now();
                const response = await fetch(GET_URL + cacheBuster, { cache: "no-store" });
                
                // NOTA: Dweet.io devuelve 404 cuando la sala es nueva. NO lanzamos error aquí.
                if (!response.ok && response.status !== 404) throw new Error("Fallo de red real");
                
                const data = await response.json();
                
                // Si la sala ya existe y tiene contenido
                if (data.this === "succeeded" && data.with && data.with.length > 0) {
                    const cloudContent = data.with[0].content;
                    const cloudTimestamp = parseInt(cloudContent.ts || 0);
                    const localTimestamp = parseInt(localStorage.getItem(`ts_${listId}`) || 0);

                    // Si la nube tiene datos más nuevos, los descargamos
                    if (cloudTimestamp > localTimestamp) {
                        let parsedItems = [];
                        try {
                            parsedItems = typeof cloudContent.payload === 'string' 
                                ? JSON.parse(cloudContent.payload) 
                                : (cloudContent.payload || []);
                        } catch(e) {}
                        
                        shoppingItems = parsedItems;
                        localStorage.setItem(`list_${listId}`, JSON.stringify(shoppingItems));
                        localStorage.setItem(`ts_${listId}`, cloudTimestamp);
                        renderItems();
                    } 
                    // Si nosotros tenemos datos más nuevos, los subimos a la nube (Resolución de conflicto)
                    else if (localTimestamp > cloudTimestamp) {
                        pushToCloud();
                    }
                    updateStatus(true);
                } 
                // Si la sala es NUEVA (Error 404)
                else if (data.with === 404 || data.because === "we couldn't find this") {
                    shoppingItems = JSON.parse(localStorage.getItem(`list_${listId}`)) || [];
                    if (shoppingItems.length > 0) {
                        pushToCloud(); // Empujamos nuestros datos locales para inicializar la nube
                    }
                    renderItems();
                    updateStatus(true);
                } else {
                    throw new Error("Formato de respuesta desconocido");
                }
            } catch (error) {
                console.warn("Usando datos locales por falla de internet.");
                if(shoppingItems.length === 0) {
                    shoppingItems = JSON.parse(localStorage.getItem(`list_${listId}`)) || [];
                    renderItems();
                }
                updateStatus(false);
            } finally {
                isSyncing = false;
            }
        }

        async function pushToCloud() {
            const timestamp = Date.now();
            const payloadStr = JSON.stringify(shoppingItems);
            
            // Guardado local inmediato
            localStorage.setItem(`list_${listId}`, payloadStr);
            localStorage.setItem(`ts_${listId}`, timestamp);
            
            try {
                // Envío en formato JSON puro (el más compatible con Dweet)
                await fetch(DWEET_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ payload: payloadStr, ts: timestamp })
                });
            } catch (error) {
                // Fallback por si el POST estricto falla en ciertos navegadores
                try {
                    await fetch(`${DWEET_URL}?payload=${encodeURIComponent(payloadStr)}&ts=${timestamp}`);
                } catch(e) {
                    console.warn("Fallo subida a nube en segundo plano.");
                }
            }
        }

        // Bucle automático cada 3 segundos
        setInterval(syncWithCloud, 3000);

        // ==========================================
        // 3. RENDERIZADO E INTERFAZ
        // ==========================================
        function renderItems() {
            const listEl = document.getElementById('items-list');
            const actionBar = document.getElementById('action-bar');
            
            if (shoppingItems.length === 0) {
                listEl.innerHTML = `
                    <div class="flex flex-col items-center justify-center py-16 text-slate-400 fade-in">
                        <div class="bg-slate-100 p-6 rounded-full mb-4">
                            <i data-lucide="check" class="w-12 h-12 text-slate-300"></i>
                        </div>
                        <p class="font-bold text-lg text-slate-600">No hay pendientes</p>
                        <p class="text-sm text-center px-4 mt-2">Agrega productos o escanea el QR desde otro celular para participar.</p>
                    </div>`;
                actionBar.classList.add('hidden');
            } else {
                listEl.innerHTML = shoppingItems.map(item => `
                    <div class="fade-in bg-white border border-slate-100 p-4 rounded-2xl shadow-sm flex items-center justify-between group hover:border-blue-200 transition-colors">
                        <div class="flex items-center gap-3 overflow-hidden">
                            <div class="w-2 h-2 rounded-full bg-blue-500 flex-shrink-0"></div>
                            <span class="font-medium text-slate-700 truncate">${item.name}</span>
                        </div>
                        <button onclick="eliminarItem('${item.id}')" class="text-slate-300 hover:text-red-500 bg-slate-50 hover:bg-red-50 p-2 rounded-xl transition-all">
                            <i data-lucide="x" class="w-4 h-4"></i>
                        </button>
                    </div>
                `).join('');
                actionBar.classList.remove('hidden');
            }
            lucide.createIcons();
        }

        document.getElementById('add-form').onsubmit = (e) => {
            e.preventDefault();
            const input = document.getElementById('item-input');
            const btn = document.getElementById('btn-add');
            const name = input.value.trim();
            if (!name) return;

            btn.innerHTML = `<div class="w-5 h-5 border-2 border-white border-t-transparent rounded-full animate-spin"></div>`;
            btn.disabled = true;

            shoppingItems.unshift({ id: Date.now().toString(), name: name });
            renderItems();
            pushToCloud();
            
            input.value = '';
            btn.innerHTML = `<i data-lucide="plus" class="w-6 h-6"></i>`;
            btn.disabled = false;
            input.focus();
        };

        window.eliminarItem = (id) => {
            shoppingItems = shoppingItems.filter(item => item.id !== id);
            renderItems();
            pushToCloud();
        };

        window.clearAllItems = () => {
            if (!confirm("¿Seguro que quieres vaciar toda la lista? Esto la borrará en todos los celulares conectados.")) return;
            shoppingItems = [];
            renderItems();
            pushToCloud();
            showToast("Lista vaciada", true);
        };

        // ==========================================
        // 4. ENVÍO DE CORREO (FormSubmit)
        // ==========================================
        window.sendListByEmail = async () => {
            if (shoppingItems.length === 0) return;

            const btn = document.getElementById('btn-send');
            const originalHTML = btn.innerHTML;
            btn.innerHTML = `<div class="animate-spin h-5 w-5 border-2 border-white border-t-transparent rounded-full"></div> Enviando...`;
            btn.disabled = true;

            const listadoFormateado = shoppingItems.map((it, i) => `${i + 1}. ${it.name}`).join('\n');

            try {
                const response = await fetch("https://formsubmit.co/ajax/contacto@widdex.com", {
                    method: "POST",
                    headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                    body: JSON.stringify({
                        _subject: "🛒 Nueva Lista del Supermercado",
                        Lista_de_Compras: listadoFormateado,
                        _template: "table"
                    })
                });

                if (response.ok) {
                    showToast("¡Enviado a contacto@widdex.com!", true);
                } else {
                    throw new Error("Fallo envío");
                }
            } catch (error) {
                showToast("Error al enviar. Revisa tu internet.", false);
            } finally {
                btn.innerHTML = originalHTML;
                btn.disabled = false;
                lucide.createIcons();
            }
        };

        // ==========================================
        // 5. UTILIDADES
        // ==========================================
        window.showToast = (msg, success = true) => {
            const toast = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = msg;
            document.getElementById('toast-icon').setAttribute('data-lucide', success ? 'check-circle-2' : 'alert-circle');
            document.getElementById('toast-icon').className = `w-5 h-5 ${success ? 'text-blue-400' : 'text-red-400'}`;
            lucide.createIcons();
            
            toast.classList.remove('opacity-0', '-translate-y-4');
            toast.classList.add('translate-y-0');
            setTimeout(() => {
                toast.classList.add('opacity-0', '-translate-y-4');
                toast.classList.remove('translate-y-0');
            }, 3000);
        };

        window.toggleQR = (show) => {
            const modal = document.getElementById('qr-modal');
            if (show) {
                let url = window.location.href.split('?')[0]; 
                
                // Advertencia si están probando en el entorno aislado temporal
                if (url.startsWith('blob:') || url.includes('usercontent')) {
                    alert("⚠️ NOTA:\nComo estás en el modo de vista previa, tu celular físico no podrá abrir el enlace del QR.\n\nGuarda este código HTML y súbelo a internet (ej. GitHub Pages) para usar el QR, o copia y pega el ID de la sala en otra pestaña de tu navegador para probar la sincronización ahora mismo.");
                    url = "https://tu-sitio-publicado.com/index.html"; 
                }

                const shareUrl = `${url}?id=${listId}`;
                document.getElementById('room-id-display').innerText = listId;
                document.getElementById('qr-image').src = `https://api.qrserver.com/v1/create-qr-code/?size=400x400&data=${encodeURIComponent(shareUrl)}&color=0f172a&bgcolor=f8fafc`;
                modal.classList.remove('hidden');
            } else {
                modal.classList.add('hidden');
            }
        };

        // Arranque
        syncWithCloud();
    </script>
</body>
</html>

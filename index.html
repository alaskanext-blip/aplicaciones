<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lista del Refri</title>
    <!-- Tailwind CSS para diseño -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Iconos -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased min-h-screen flex flex-col">

    <main class="flex-1 w-full max-w-md mx-auto bg-white min-h-screen shadow-xl relative pb-32 border-x border-slate-100">
        
        <!-- Encabezado -->
        <header class="bg-slate-900 text-white p-6 rounded-b-[2rem] shadow-lg sticky top-0 z-10">
            <div class="flex items-center justify-between">
                <div>
                    <h1 class="text-xl md:text-2xl font-black tracking-tight">Lista de Supermercados</h1>
                    <p class="text-[10px] md:text-xs font-bold uppercase tracking-widest mt-1 flex items-center gap-1">
                        <span id="sync-dot" class="w-2 h-2 rounded-full bg-slate-500"></span> 
                        <span id="sync-text" class="text-slate-400">Conectando a la nube...</span>
                    </p>
                </div>
                <button onclick="toggleQR(true)" class="bg-white/10 hover:bg-white/20 p-3 rounded-2xl transition-all active:scale-95 ml-2">
                    <i data-lucide="qr-code" class="w-5 h-5 md:w-6 md:h-6"></i>
                </button>
            </div>

            <!-- Formulario de Ingreso -->
            <form id="add-form" class="mt-6 flex gap-2 relative">
                <input type="text" id="item-input" required autocomplete="off" disabled
                    placeholder="Esperando conexión..." 
                    class="flex-1 px-5 py-4 rounded-2xl text-slate-900 placeholder-slate-400 focus:outline-none focus:ring-4 focus:ring-blue-500/50 shadow-inner transition-all disabled:bg-slate-100 disabled:text-slate-400">
                <button type="submit" id="btn-add" disabled class="bg-blue-600 text-white p-4 rounded-2xl hover:bg-blue-500 active:scale-95 transition-all shadow-lg flex items-center justify-center min-w-[60px] disabled:bg-slate-300 disabled:cursor-not-allowed">
                    <i data-lucide="plus" class="w-6 h-6"></i>
                </button>
            </form>
        </header>

        <!-- Lista de Productos -->
        <div class="p-6">
            <div id="items-list" class="space-y-3">
                <div class="flex flex-col items-center justify-center py-16 text-slate-400">
                    <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600 mb-4"></div>
                    <p class="font-medium text-sm">Sincronizando con Firestore...</p>
                </div>
            </div>
        </div>

        <!-- Barra de Acciones Inferior -->
        <div id="action-bar" class="fixed bottom-0 left-0 right-0 w-full max-w-md mx-auto bg-white/90 backdrop-blur-md border-t border-slate-100 p-4 pb-safe hidden">
            <div class="grid grid-cols-2 gap-3">
                <button onclick="copyList()" class="bg-blue-50 text-blue-600 hover:bg-blue-100 py-3 rounded-2xl font-bold flex items-center justify-center gap-2 transition-all active:scale-95 shadow-sm">
                    <i data-lucide="copy" class="w-5 h-5"></i> Copiar
                </button>
                <button onclick="clearAllItems()" class="bg-red-50 text-red-500 hover:bg-red-100 py-3 rounded-2xl font-bold flex items-center justify-center gap-2 transition-all active:scale-95 shadow-sm">
                    <i data-lucide="trash-2" class="w-5 h-5"></i> Vaciar
                </button>
                <button onclick="sendListByEmail()" id="btn-send" class="col-span-2 bg-slate-900 text-white hover:bg-black py-4 rounded-2xl font-bold flex items-center justify-center gap-2 shadow-lg transition-all active:scale-95">
                    <i data-lucide="send" class="w-5 h-5"></i> Enviar lista
                </button>
            </div>
        </div>
    </main>

    <!-- Modal QR -->
    <div id="qr-modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-6 z-50 fade-in">
        <div class="bg-white p-8 rounded-[2.5rem] w-full max-w-sm text-center relative shadow-2xl">
            <button onclick="toggleQR(false)" class="absolute top-5 right-5 text-slate-400 hover:text-slate-700 bg-slate-100 rounded-full p-2 transition-all">
                <i data-lucide="x" class="w-5 h-5"></i>
            </button>
            <div class="bg-blue-50 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4">
                <i data-lucide="cloud" class="w-8 h-8 text-blue-600"></i>
            </div>
            <h2 class="text-2xl font-black mb-2 text-slate-800">Sincronización</h2>
            <p class="text-slate-500 text-sm mb-6">Escanea el código para abrir la app. Todos los celulares verán los cambios al instante gracias a la nube.</p>
            <div class="bg-white p-4 rounded-3xl border-2 border-slate-100 shadow-inner mb-2">
                <img id="qr-image" src="" alt="Código QR" class="w-full aspect-square">
            </div>
        </div>
    </div>

    <!-- Notificaciones flotantes (Toast) -->
    <div id="toast" class="fixed top-6 left-1/2 transform -translate-x-1/2 bg-slate-800 text-white px-6 py-3 rounded-full shadow-2xl transition-all duration-300 opacity-0 -translate-y-4 pointer-events-none z-[60] flex items-center gap-2 font-medium text-sm">
        <i data-lucide="check-circle-2" class="w-5 h-5 text-blue-400" id="toast-icon"></i>
        <span id="toast-msg">Mensaje</span>
    </div>

    <!-- ========================================== -->
    <!-- SCRIPTS DE FIREBASE (LA NUBE REAL)         -->
    <!-- ========================================== -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, getDocs, writeBatch } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        // =====================================================================
        // ⚠️ ZONA DE CONFIGURACIÓN DE GITHUB (REEMPLAZAR AL EXPORTAR)
        // =====================================================================
        const isPreviewMode = typeof __firebase_config !== 'undefined';
        
        const firebaseConfig = isPreviewMode ? JSON.parse(__firebase_config) : {
            apiKey: "AIzaSyD82WMeIpqSU0ruTrFLIXSt-rbTZcHaxf0",
            authDomain: "appsupermercado-c018b.firebaseapp.com",
            projectId: "appsupermercado-c018b",
            storageBucket: "appsupermercado-c018b.firebasestorage.app",
            messagingSenderId: "1004793635757",
            appId: "1:1004793635757:web:1448e4ccbd5bd90f02f724",
            measurementId: "G-5KJ63B6PD5"
        };
        // =====================================================================

        const appId = typeof __app_id !== 'undefined' ? __app_id : 'lista-widdex-compartida';
        
        // Inicializar Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let shoppingItems = [];
        lucide.createIcons();

        // 1. SISTEMA DE AUTENTICACIÓN (Regla Obligatoria de Firebase)
        const iniciarConexion = async () => {
            try {
                if (!isPreviewMode && firebaseConfig.apiKey === "TU_API_KEY") {
                    mostrarErrorCritico("Para usar esta app en GitHub o tu propio hosting, debes reemplazar 'TU_API_KEY' con las llaves de tu proyecto de Firebase.");
                    return;
                }

                // Iniciar sesión silenciosa en la nube
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (error) {
                console.error("Error de autenticación:", error);
                mostrarErrorCritico("No se pudo conectar a la nube de Firebase. Revisa tu configuración o conexión a internet.");
            }
        };

        // 2. ESCUCHAR CAMBIOS EN TIEMPO REAL (Simultaneidad)
        onAuthStateChanged(auth, (user) => {
            if (!user) return; // Esperar a que el usuario esté conectado

            const dot = document.getElementById('sync-dot');
            const text = document.getElementById('sync-text');
            const input = document.getElementById('item-input');
            const btnAdd = document.getElementById('btn-add');

            // Indicadores visuales de éxito
            dot.className = "w-2 h-2 rounded-full bg-green-400 animate-pulse";
            text.className = "text-green-400";
            text.innerText = "Nube Conectada";
            input.disabled = false;
            input.placeholder = "¿Qué falta comprar?";
            btnAdd.disabled = false;

            // Referencia a la base de datos (Colección compartida)
            const listRef = collection(db, 'artifacts', appId, 'public', 'data', 'shopping_list');

            // Suscribirse a los cambios en vivo
            onSnapshot(listRef, (snapshot) => {
                shoppingItems = snapshot.docs.map(doc => ({
                    id: doc.id,
                    ...doc.data()
                }));
                
                // Ordenar por fecha de creación (más recientes primero)
                shoppingItems.sort((a, b) => b.createdAt - a.createdAt);
                
                renderItems();
            }, (error) => {
                console.error("Error leyendo Firestore:", error);
                mostrarErrorCritico("Se perdieron los permisos de lectura en la base de datos.");
            });
        });

        // 3. RENDERIZAR LISTA EN PANTALLA
        function renderItems() {
            const listEl = document.getElementById('items-list');
            const actionBar = document.getElementById('action-bar');
            
            if (shoppingItems.length === 0) {
                listEl.innerHTML = `
                    <div class="flex flex-col items-center justify-center py-16 text-slate-400 fade-in">
                        <div class="bg-slate-100 p-6 rounded-full mb-4">
                            <i data-lucide="check" class="w-12 h-12 text-slate-300"></i>
                        </div>
                        <p class="font-bold text-lg text-slate-600">No hay pendientes</p>
                        <p class="text-sm text-center px-4 mt-2">Agrega productos y se sincronizarán al instante con todos los dispositivos.</p>
                    </div>`;
                actionBar.classList.add('hidden');
            } else {
                listEl.innerHTML = shoppingItems.map(item => `
                    <div class="fade-in bg-white border border-slate-100 p-4 rounded-2xl shadow-sm flex items-center justify-between group hover:border-blue-200 transition-colors">
                        <div class="flex items-center gap-3 overflow-hidden">
                            <div class="w-2 h-2 rounded-full bg-blue-500 flex-shrink-0"></div>
                            <span class="font-medium text-slate-700 truncate">${item.name}</span>
                        </div>
                        <button onclick="window.eliminarItem('${item.id}')" class="text-slate-300 hover:text-red-500 bg-slate-50 hover:bg-red-50 p-2 rounded-xl transition-all">
                            <i data-lucide="x" class="w-4 h-4"></i>
                        </button>
                    </div>
                `).join('');
                actionBar.classList.remove('hidden');
            }
            lucide.createIcons();
        }

        // 4. AÑADIR PRODUCTO (Sube a la Nube)
        document.getElementById('add-form').onsubmit = async (e) => {
            e.preventDefault();
            if (!auth.currentUser) return;

            const input = document.getElementById('item-input');
            const btn = document.getElementById('btn-add');
            const name = input.value.trim();
            if (!name) return;

            // Bloquear input mientras sube para evitar dobles envíos
            input.disabled = true;
            btn.innerHTML = `<div class="w-5 h-5 border-2 border-white border-t-transparent rounded-full animate-spin"></div>`;

            try {
                const listRef = collection(db, 'artifacts', appId, 'public', 'data', 'shopping_list');
                await addDoc(listRef, {
                    name: name,
                    createdAt: Date.now()
                });
                input.value = '';
            } catch (err) {
                showToast("Error al guardar en la nube", false);
            } finally {
                input.disabled = false;
                btn.innerHTML = `<i data-lucide="plus" class="w-6 h-6"></i>`;
                lucide.createIcons();
                input.focus();
            }
        };

        // 5. ELIMINAR Y VACIAR (Sube a la Nube)
        window.eliminarItem = async (id) => {
            if (!auth.currentUser) return;
            try {
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'shopping_list', id));
            } catch (err) {
                showToast("Error al eliminar", false);
            }
        };

        window.clearAllItems = async () => {
            if (!auth.currentUser || !confirm("¿Seguro que quieres vaciar la lista en todos los celulares?")) return;
            
            try {
                const listRef = collection(db, 'artifacts', appId, 'public', 'data', 'shopping_list');
                const snapshot = await getDocs(listRef);
                const batch = writeBatch(db);
                
                snapshot.docs.forEach(doc => {
                    batch.delete(doc.ref);
                });
                
                await batch.commit();
                showToast("Lista vaciada correctamente", true);
            } catch (err) {
                showToast("Error al vaciar la lista", false);
            }
        };

        // 6. COPIAR LISTA
        window.copyList = () => {
            if (shoppingItems.length === 0) return;
            
            const listadoFormateado = shoppingItems.map((it, i) => `${i + 1}. ${it.name}`).join('\n');
            const textoCompleto = `🛒 Lista de Supermercados:\n\n${listadoFormateado}`;
            
            // Método compatible con todos los navegadores
            const textArea = document.createElement("textarea");
            textArea.value = textoCompleto;
            document.body.appendChild(textArea);
            textArea.select();
            try {
                document.execCommand('copy');
                showToast("¡Lista copiada al portapapeles!", true);
            } catch (err) {
                showToast("Error al copiar la lista", false);
            }
            document.body.removeChild(textArea);
        };

        // 7. ENVIAR CORREO MEDIANTE FORMSUBMIT
        window.sendListByEmail = async () => {
            if (shoppingItems.length === 0) return;

            const btn = document.getElementById('btn-send');
            const originalHTML = btn.innerHTML;
            btn.innerHTML = `<div class="animate-spin h-5 w-5 border-2 border-white border-t-transparent rounded-full"></div> Enviando...`;
            btn.disabled = true;

            const listadoFormateado = shoppingItems.map((it, i) => `${i + 1}. ${it.name}`).join('\n');

            try {
                const response = await fetch("https://formsubmit.co/ajax/contacto@widdex.com", {
                    method: "POST",
                    headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                    body: JSON.stringify({
                        _subject: "🛒 Lista de Supermercados",
                        Lista_de_Compras: listadoFormateado,
                        _template: "table"
                    })
                });

                if (response.ok) {
                    showToast("¡Enviado a contacto@widdex.com!", true);
                } else {
                    throw new Error("Fallo envío");
                }
            } catch (error) {
                showToast("Error al enviar. Revisa tu internet.", false);
            } finally {
                btn.innerHTML = originalHTML;
                btn.disabled = false;
                lucide.createIcons();
            }
        };

        // 8. UTILIDADES (UI y Alertas)
        function mostrarErrorCritico(mensaje) {
            document.getElementById('sync-dot').className = "w-2 h-2 rounded-full bg-red-500";
            document.getElementById('sync-text').className = "text-red-500 font-bold";
            document.getElementById('sync-text').innerText = "Error de Nube";
            
            const listEl = document.getElementById('items-list');
            listEl.innerHTML = `
                <div class="bg-red-50 border border-red-200 text-red-600 p-6 rounded-2xl text-center text-sm shadow-inner">
                    <i data-lucide="alert-triangle" class="w-8 h-8 mx-auto mb-3 text-red-500"></i>
                    <b>Error de Conexión</b><br><br>${mensaje}
                </div>`;
            lucide.createIcons();
        }

        window.showToast = (msg, success = true) => {
            const toast = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = msg;
            document.getElementById('toast-icon').setAttribute('data-lucide', success ? 'check-circle-2' : 'alert-circle');
            document.getElementById('toast-icon').className = `w-5 h-5 ${success ? 'text-blue-400' : 'text-red-400'}`;
            lucide.createIcons();
            
            toast.classList.remove('opacity-0', '-translate-y-4');
            toast.classList.add('translate-y-0');
            setTimeout(() => {
                toast.classList.add('opacity-0', '-translate-y-4');
                toast.classList.remove('translate-y-0');
            }, 3000);
        };

        window.toggleQR = (show) => {
            const modal = document.getElementById('qr-modal');
            if (show) {
                let url = window.location.href.split('?')[0]; 
                if (url.startsWith('blob:') || url.includes('usercontent')) {
                    url = "https://tu-sitio-en-github.com"; 
                }
                document.getElementById('qr-image').src = `https://api.qrserver.com/v1/create-qr-code/?size=400x400&data=${encodeURIComponent(url)}&color=0f172a&bgcolor=ffffff`;
                modal.classList.remove('hidden');
            } else {
                modal.classList.add('hidden');
            }
        };

        // Arrancar la App
        iniciarConexion();
    </script>
</body>
</html>

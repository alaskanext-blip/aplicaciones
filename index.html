<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Súper Lista del Refri</title>
    <!-- Tailwind CSS para diseño moderno -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons para iconos -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        [v-cloak] { display: none; }
        .modal-bg { background-color: rgba(15, 23, 42, 0.6); backdrop-filter: blur(4px); }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans min-h-screen">

    <div class="max-w-md mx-auto p-4 md:p-8">
        <!-- Encabezado -->
        <header class="flex items-center justify-between mb-8 bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
            <div class="flex items-center gap-3">
                <div class="bg-green-600 p-2 rounded-lg shadow-inner text-white">
                    <i data-lucide="shopping-cart"></i>
                </div>
                <div>
                    <h1 class="font-bold text-xl leading-tight">Súper Lista</h1>
                    <p class="text-[10px] text-slate-400 uppercase tracking-widest font-bold">Familiar • Tiempo Real</p>
                </div>
            </div>
            <div class="flex gap-2">
                <button onclick="toggleSettings()" class="p-2 hover:bg-slate-100 rounded-full text-slate-400 transition-colors">
                    <i data-lucide="settings"></i>
                </button>
                <button onclick="toggleQR(true)" class="p-2 hover:bg-slate-100 rounded-full text-slate-400 transition-colors">
                    <i data-lucide="qr-code"></i>
                </button>
            </div>
        </header>

        <!-- Configuración de Email -->
        <div id="settings-panel" class="hidden mb-6 bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
            <h2 class="font-bold text-sm mb-3">Configuración de Envío</h2>
            <div class="space-y-3">
                <label class="text-xs text-slate-500 block mb-1 font-medium">Enviar lista a:</label>
                <input type="email" id="target-email" 
                    class="w-full px-4 py-2 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-green-500 outline-none transition-all" 
                    placeholder="ejemplo@correo.com" onchange="saveEmail(this.value)">
            </div>
        </div>

        <!-- Formulario para añadir -->
        <form id="add-form" class="mb-6 flex gap-2">
            <input type="text" id="item-input" required
                placeholder="Añadir algo al refri..." 
                class="flex-1 px-5 py-4 rounded-2xl border border-slate-200 focus:ring-2 focus:ring-green-500 outline-none transition-all shadow-sm">
            <button type="submit" class="bg-green-600 hover:bg-green-700 text-white p-4 rounded-2xl shadow-lg shadow-green-100 transition-all active:scale-95">
                <i data-lucide="plus"></i>
            </button>
        </form>

        <!-- Lista de Items -->
        <div class="bg-white rounded-[2rem] shadow-sm border border-slate-100 overflow-hidden mb-8">
            <div id="items-list" class="divide-y divide-slate-50">
                <!-- Los items se cargarán aquí -->
                <div class="p-12 text-center text-slate-400">
                    <div class="animate-spin inline-block w-6 h-6 border-2 border-green-600 border-t-transparent rounded-full mb-2"></div>
                    <p>Conectando...</p>
                </div>
            </div>
        </div>

        <!-- Botones de acción -->
        <div id="actions-container" class="hidden grid grid-cols-2 gap-4">
            <button onclick="sendListByEmail()" class="flex flex-col items-center justify-center gap-1 bg-slate-900 hover:bg-black text-white py-3 rounded-2xl font-bold text-sm shadow-xl active:scale-95 transition-all">
                <i data-lucide="mail" class="w-5 h-5"></i> Abrir Correo
            </button>
            <button onclick="copyList()" class="flex flex-col items-center justify-center gap-1 bg-blue-100 hover:bg-blue-200 text-blue-700 py-3 rounded-2xl font-bold text-sm shadow-sm active:scale-95 transition-all">
                <i data-lucide="copy" class="w-5 h-5"></i> Copiar Lista
            </button>
            <button onclick="clearAllItems()" class="col-span-2 flex items-center justify-center gap-2 bg-white text-red-600 border border-red-100 hover:bg-red-50 py-3 rounded-2xl font-bold text-sm active:scale-95 transition-all">
                <i data-lucide="trash-2" class="w-4 h-4"></i> Vaciar Todo
            </button>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-6 left-1/2 transform -translate-x-1/2 bg-slate-800 text-white px-5 py-3 rounded-xl shadow-2xl transition-all duration-300 opacity-0 translate-y-4 pointer-events-none z-50 flex items-center gap-3">
        <i data-lucide="info" class="w-5 h-5 text-blue-400"></i>
        <span id="toast-msg" class="text-sm font-medium"></span>
    </div>

    <!-- Modal QR -->
    <div id="qr-modal" class="hidden fixed inset-0 modal-bg flex items-center justify-center p-6 z-50">
        <div class="bg-white p-8 rounded-[2.5rem] max-w-sm w-full text-center relative shadow-2xl">
            <button onclick="toggleQR(false)" class="absolute top-6 right-6 text-slate-300 hover:text-slate-600 transition-colors">
                <i data-lucide="x"></i>
            </button>
            <h2 class="text-2xl font-black mb-2">Pégalo en el Refri</h2>
            <p class="text-slate-500 text-sm mb-8 leading-relaxed">Cualquiera que escanee este código podrá ver y editar la lista contigo.</p>
            <div class="bg-slate-50 p-6 rounded-3xl mb-8 border border-slate-100 shadow-inner">
                <img id="qr-image" src="" alt="QR Code" class="mx-auto w-full aspect-square mix-blend-multiply">
            </div>
            <div class="p-3 bg-slate-50 rounded-xl border border-dashed border-slate-200 overflow-hidden">
                <p id="current-url" class="text-[10px] text-slate-400 font-mono break-all"></p>
            </div>
        </div>
    </div>

    <!-- Firebase Scripts -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, getDocs, writeBatch } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        // --- CONFIGURACIÓN DE FIREBASE ---
        const firebaseConfig = typeof __firebase_config !== 'undefined' 
            ? JSON.parse(__firebase_config) 
            : {
                apiKey: "TU_API_KEY",
                authDomain: "TU_PROYECTO.firebaseapp.com",
                projectId: "TU_PROYECTO",
                storageBucket: "TU_PROYECTO.appspot.com",
                messagingSenderId: "TU_ID",
                appId: "TU_APP_ID"
            };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'grocery-list-html';

        let shoppingItems = [];
        let unsubscribeList = null;

        // Inicializar Iconos
        lucide.createIcons();

        // 1. Definir Referencia a la colección (Siguiendo Regla 1)
        const listRef = collection(db, 'artifacts', appId, 'public', 'data', 'shopping_list');

        // 2. Lógica de Autenticación (Regla 3: Auth ANTES de Firestore)
        const initAuth = async () => {
            try {
                // Comprobación para evitar el error genérico si faltan las credenciales
                if (firebaseConfig.apiKey === "TU_API_KEY") {
                    throw new Error("unconfigured");
                }
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (error) {
                console.error("Auth error:", error);
                let msg = "Error al iniciar sesión.";
                if (error.message === "unconfigured" || (error.code && error.code.includes("api-key"))) {
                    msg = "¡Falta configurar Firebase! Debes editar el archivo y poner tu API_KEY y datos del proyecto.";
                }
                document.getElementById('items-list').innerHTML = `<div class="p-8 text-center text-red-500 bg-red-50 rounded-2xl border border-red-100 text-sm font-medium">${msg}</div>`;
            }
        };

        // 3. Listener de Estado de Auth
        onAuthStateChanged(auth, (user) => {
            if (user) {
                console.log("Usuario autenticado:", user.uid);
                startListListener();
            } else {
                console.log("Esperando autenticación...");
            }
        });

        // 4. Iniciar Escucha de Datos
        function startListListener() {
            if (unsubscribeList) unsubscribeList();

            unsubscribeList = onSnapshot(listRef, (snapshot) => {
                shoppingItems = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                shoppingItems.sort((a, b) => b.createdAt - a.createdAt);
                renderItems();
            }, (err) => {
                console.error("Error Firestore:", err);
                if (err.code === 'permission-denied') {
                    document.getElementById('items-list').innerHTML = '<div class="p-12 text-center text-red-500 font-medium">Permisos insuficientes. Verificando conexión...</div>';
                }
            });
        }

        // Renderizar Lista
        function renderItems() {
            const listEl = document.getElementById('items-list');
            const actionsEl = document.getElementById('actions-container');
            
            if (shoppingItems.length === 0) {
                listEl.innerHTML = `
                    <div class="p-12 text-center animate-in fade-in duration-500">
                        <div class="bg-slate-50 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-4 text-slate-200">
                            <i data-lucide="check-circle-2" class="w-10 h-10"></i>
                        </div>
                        <p class="text-slate-400 text-sm font-medium">¡No falta nada!</p>
                    </div>`;
                actionsEl.classList.add('hidden');
            } else {
                listEl.innerHTML = shoppingItems.map(item => `
                    <div class="flex items-center justify-between p-5 group hover:bg-slate-50 transition-colors border-b border-slate-50 last:border-0">
                        <span class="text-slate-700 font-medium">${item.name}</span>
                        <button onclick="window.removeItem('${item.id}')" class="text-slate-200 hover:text-red-500 p-2 transition-colors">
                            <i data-lucide="trash-2" class="w-5 h-5"></i>
                        </button>
                    </div>
                `).join('');
                actionsEl.classList.remove('hidden');
                actionsEl.classList.add('grid');
            }
            lucide.createIcons();
        }

        // Agregar Item
        document.getElementById('add-form').onsubmit = async (e) => {
            e.preventDefault();
            if (!auth.currentUser) return;

            const input = document.getElementById('item-input');
            const name = input.value.trim();
            if (!name) return;

            try {
                await addDoc(listRef, { name, createdAt: Date.now() });
                input.value = '';
            } catch (err) { console.error(err); }
        };

        // Eliminar Item
        window.removeItem = async (id) => {
            if (!auth.currentUser) return;
            try {
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'shopping_list', id));
            } catch (err) { console.error(err); }
        };

        // Sistema de Notificaciones (Toast)
        window.showToast = (msg) => {
            const toast = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = msg;
            toast.classList.remove('opacity-0', 'translate-y-4');
            setTimeout(() => toast.classList.add('opacity-0', 'translate-y-4'), 3000);
        };

        // Copiar Lista (Alternativa a Correo)
        window.copyList = () => {
            const listStr = shoppingItems.map((it, i) => `${i + 1}. ${it.name}`).join('\n');
            const fullText = `Lista de compras:\n\n${listStr}`;
            
            // Usamos un método compatible con iframes para copiar al portapapeles
            const textArea = document.createElement("textarea");
            textArea.value = fullText;
            document.body.appendChild(textArea);
            textArea.select();
            try {
                document.execCommand('copy');
                window.showToast("¡Lista copiada al portapapeles!");
            } catch (err) {
                window.showToast("Error al copiar la lista");
            }
            document.body.removeChild(textArea);
        };

        // Vaciar Todo
        window.clearAllItems = async () => {
            if (!auth.currentUser || !confirm("¿Vaciar toda la lista?")) return;
            try {
                const snapshot = await getDocs(listRef);
                const batch = writeBatch(db);
                snapshot.docs.forEach(d => batch.delete(d.ref));
                await batch.commit();
            } catch (err) { console.error(err); }
        };

        // Enviar por Email
        window.sendListByEmail = () => {
            const email = document.getElementById('target-email').value;
            if (!email) {
                toggleSettings();
                document.getElementById('target-email').focus();
                return;
            }
            const listStr = shoppingItems.map((it, i) => `${i + 1}. ${it.name}`).join('%0D%0A');
            const body = `Lista de compras:%0D%0A%0D%0A${listStr}`;
            const mailtoUrl = `mailto:${email}?subject=Lista del Supermercado&body=${body}`;

            window.showToast("Abriendo aplicación de correo...");

            // Usamos target="_top" para forzar la apertura fuera del iframe
            const tempLink = document.createElement('a');
            tempLink.href = mailtoUrl;
            tempLink.target = '_top';
            document.body.appendChild(tempLink);
            tempLink.click();
            document.body.removeChild(tempLink);
        };

        // QR y Configuración UI
        window.toggleSettings = () => document.getElementById('settings-panel').classList.toggle('hidden');
        
        window.toggleQR = (show) => {
            const modal = document.getElementById('qr-modal');
            if (show) {
                const url = window.location.href;
                document.getElementById('qr-image').src = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent(url)}`;
                document.getElementById('current-url').innerText = url;
                modal.classList.remove('hidden');
            } else {
                modal.classList.add('hidden');
            }
        };

        window.saveEmail = (val) => localStorage.setItem('savedEmail', val);
        // Se define el correo por defecto
        document.getElementById('target-email').value = localStorage.getItem('savedEmail') || 'contacto@widdex.com';

        // Iniciar flujo de Auth al cargar
        initAuth();
    </script>
</body>
</html>
